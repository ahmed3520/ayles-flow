<svg
  width="100%"
  height="100%"
  viewBox="0 0 1600 900"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  preserveAspectRatio="xMidYMid slice"
>
  <defs>
    <linearGradient
      id="coverBackground"
      x1="800"
      y1="36"
      x2="800"
      y2="900"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#FBFAF7" />
      <stop offset="1" stop-color="#F1EEE8" />
    </linearGradient>
    <radialGradient
      id="coverGlow"
      cx="0"
      cy="0"
      r="1"
      gradientUnits="userSpaceOnUse"
      gradientTransform="translate(800 390) rotate(90) scale(300 560)"
    >
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.65" />
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0" />
    </radialGradient>
    <linearGradient
      id="sunCurveStroke"
      x1="190"
      y1="770"
      x2="1410"
      y2="770"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#B6BECB" stop-opacity="0" />
      <stop offset="0.18" stop-color="#B6BECB" stop-opacity="0.7" />
      <stop offset="0.5" stop-color="#AAB4C3" stop-opacity="0.95" />
      <stop offset="0.82" stop-color="#B6BECB" stop-opacity="0.7" />
      <stop offset="1" stop-color="#B6BECB" stop-opacity="0" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#coverBackground)" />
  <rect width="1600" height="900" fill="url(#coverGlow)" />
  <style>
    .wordmark {
      fill: #101215;
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 250px;
      font-weight: 400;
      font-style: italic;
      letter-spacing: -0.03em;
    }

    .title {
      fill: #4b5568;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 38px;
      font-weight: 500;
      letter-spacing: 0.12em;
    }
  </style>
  <text x="806" y="430" text-anchor="middle" class="wordmark">Ayles Flow</text>
  <text x="800" y="536" text-anchor="middle" class="title">
    Introducing Ayles Flow
  </text>
  <path d="M635 571H965" stroke="#C9CED8" stroke-width="2" />
  <path
    d="M190 770C400 545 1200 545 1410 770"
    stroke="url(#sunCurveStroke)"
    stroke-width="4"
    stroke-linecap="round"
  />
</svg>
